<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlocStore Android | Home</title>
    <link rel="icon" type="image/x-icon" href="../logo.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .app-card { min-width: 150px; }
        /* Style plus "bouton" pour mobile */
        .btn-mobile { active:scale-95 transition-transform; }
    </style>
    <script>
        // Redirection si on n'est pas sur Android
        if (!/Android/.test(window.navigator.userAgent)) { window.location.href = "/"; }
    </script>
</head>
<body class="bg-gray-900 text-white font-sans overflow-x-hidden">

    <nav class="bg-gray-800 p-4 border-b border-green-500 sticky top-0 z-50 flex justify-between items-center shadow-2xl">
        <div class="flex items-center space-x-2">
            <img src="../logo.png" class="w-7 h-7" alt="Logo">
            <h1 class="text-lg font-black tracking-tight text-green-500 uppercase">Bloc<span class="text-white">Droid</span></h1>
        </div>
        <button id="menu-btn" class="p-2 bg-gray-700 rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </nav>

    <div class="p-6">
        <div class="bg-gradient-to-r from-green-600 to-blue-600 p-6 rounded-3xl shadow-lg mb-8">
            <h2 class="text-2xl font-black">Bienvenue sur le Store</h2>
            <p class="text-white/80 text-sm">Téléchargez vos APKs en toute sécurité.</p>
        </div>

        <h3 class="text-lg font-bold mb-4 flex items-center">
            <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
            Populaire sur Android
        </h3>

        <div class="flex gap-4 overflow-x-auto pb-4 hide-scrollbar">
            <div class="app-card bg-gray-800 p-4 rounded-3xl border border-gray-700 flex flex-col items-center">
                <img src="../assets/icons/blocplay.png" class="w-16 h-16 rounded-2xl mb-3" alt="BlocPlay">
                <h4 class="text-sm font-bold">BlocPlay</h4>
                <p class="text-[9px] text-green-400 mb-3 uppercase font-bold">Version Mobile</p>
                <a href="/android/blocplay" class="w-full bg-green-600 py-2 rounded-xl text-[10px] font-bold text-center btn-mobile">Voir</a>
            </div>
            </div>
    </div>

</body>
</html>
