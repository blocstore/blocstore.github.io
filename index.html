<!DOCTYPE html>
<html>
<head>
    <title>Redirection BlocStore...</title>
    <script>
        function detectOS() {
            const userAgent = window.navigator.userAgent;
            const platform = window.navigator.platform;

            // Logique de redirection
            if (/iPad|iPhone|iPod/.test(userAgent) || /Mac/.test(platform)) {
                window.location.href = "/apple";
            } else if (/Android/.test(userAgent)) {
                window.location.href = "/android";
            } else if (/Linux/.test(platform)) {
                window.location.href = "/linux";
            } else if (/Win/.test(platform)) {
                window.location.href = "/windows";
            } else {
                // Par défaut, si on ne sait pas, on envoie sur Windows ou une page de choix
                window.location.href = "/windows"; 
            }
        }
        window.onload = detectOS;
    </script>
</head>
<body style="background: #111827;">
</body>
</html>
