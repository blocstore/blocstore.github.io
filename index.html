<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlocStore | Populaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .app-card { transition: all 0.2s ease-in-out; }
        .app-card:hover { transform: scale(1.02); background-color: #2d3748; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="bg-gray-800 p-4 border-b border-blue-600 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center px-2">
            <h1 class="text-xl font-black tracking-tighter text-blue-400">BLOC<span class="text-white">STORE</span></h1>
            <a href="#" class="bg-blue-600 px-5 py-1.5 rounded-full hover:bg-blue-700 transition font-bold text-sm">
                Se connecter
            </a>
        </div>
    </nav>

    <header class="py-10 text-center bg-gray-900 px-4">
        <h2 class="text-3xl font-extrabold mb-1">BlocStore</h2>
        <p class="text-gray-500 text-sm uppercase tracking-widest font-semibold">Édition BlocPlay Studios</p>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div class="flex items-center mb-6 ml-2">
            <div class="h-6 w-1 bg-blue-500 rounded-full mr-3"></div>
            <h2 class="text-lg font-bold uppercase tracking-tight">Populaire</h2>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
            
            <div class="app-card bg-gray-800 rounded-xl p-4 border border-gray-700 flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-gradient-to-br from-yellow-400 to-orange-600 rounded-2xl mb-3 flex items-center justify-center text-3xl shadow-lg flex-shrink-0">🔥</div>
                <h3 class="text-sm font-bold truncate w-full">Mega Blast</h3>
                <p class="text-blue-400 text-[10px] font-bold mb-3">1.2M DL</p>
                <button class="w-full bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white py-1.5 rounded-lg text-xs font-bold transition">Installer</button>
            </div>

            <div class="app-card bg-gray-800 rounded-xl p-4 border border-gray-700 flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-indigo-600 rounded-2xl mb-3 flex items-center justify-center text-3xl shadow-lg flex-shrink-0">🚀</div>
                <h3 class="text-sm font-bold truncate w-full">Space Drift</h3>
                <p class="text-blue-400 text-[10px] font-bold mb-3">850K DL</p>
                <button class="w-full bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white py-1.5 rounded-lg text-xs font-bold transition">Installer</button>
            </div>

            <div class="app-card bg-gray-800 rounded-xl p-4 border border-gray-700 flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-gradient-to-br from-green-400 to-emerald-600 rounded-2xl mb-3 flex items-center justify-center text-3xl shadow-lg flex-shrink-0">🌲</div>
                <h3 class="text-sm font-bold truncate w-full">Craft World</h3>
                <p class="text-blue-400 text-[10px] font-bold mb-3">2.5M DL</p>
                <button class="w-full bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white py-1.5 rounded-lg text-xs font-bold transition">Installer</button>
            </div>

            <div class="app-card bg-gray-800 rounded-xl p-4 border border-gray-700 flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-gradient-to-br from-purple-400 to-pink-600 rounded-2xl mb-3 flex items-center justify-center text-3xl shadow-lg flex-shrink-0">🎵</div>
                <h3 class="text-sm font-bold truncate w-full">Beat Studio</h3>
                <p class="text-blue-400 text-[10px] font-bold mb-3">500K DL</p>
                <button class="w-full bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white py-1.5 rounded-lg text-xs font-bold transition">Installer</button>
            </div>

            <div class="app-card bg-gray-800 rounded-xl p-4 border border-gray-700 flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-gradient-to-br from-red-400 to-red-700 rounded-2xl mb-3 flex items-center justify-center text-3xl shadow-lg flex-shrink-0">🛡️</div>
                <h3 class="text-sm font-bold truncate w-full">Bloc Guard</h3>
                <p class="text-blue-400 text-[10px] font-bold mb-3">100K DL</p>
                <button class="w-full bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white py-1.5 rounded-lg text-xs font-bold transition">Installer</button>
            </div>

        </div>
    </main>

    <footer class="text-center py-8 text-gray-600 border-t border-gray-800 bg-gray-900">
        <p class="text-[10px] uppercase tracking-widest mb-1">© 2026 BlocStore</p>
        <p class="text-xs font-bold text-blue-500/50">Proposé par BlocPlay Studios</p>
    </footer>

</body>
</html>
